[server]
enableStaticServing = true

[theme]
primaryColor       = "#29B5E8"
backgroundColor    = "#07111F"
secondaryBackgroundColor = "#0D1F3A"
textColor          = "#FFFFFF"
font               = "sans serif"

[[theme.fontFaces]]
family = "Inter"
url    = "app/static/Inter-Regular.ttf"
weight = 400

[[theme.fontFaces]]
family = "Inter"
url    = "app/static/Inter-Medium.ttf"
weight = 500

[[theme.fontFaces]]
family = "Inter"
url    = "app/static/Inter-SemiBold.ttf"
weight = 600

[[theme.fontFaces]]
family = "Inter"
url    = "app/static/Inter-Bold.ttf"
weight = 700

[[theme.fontFaces]]
family = "JetBrainsMono"
url    = "app/static/JetBrainsMono-Regular.ttf"
weight = 400

[[theme.fontFaces]]
family = "JetBrainsMono"
url    = "app/static/JetBrainsMono-Medium.ttf"
weight = 500
